<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MeIDs Intellectual Twin Keynote - Jenga Dual Mode</title>
  <style>
    :root {
      --ink: #101312;
      --paper: #f7f3ea;
      --muted: #7b817b;
      --line: rgba(16, 19, 18, 0.14);
      --red: #e1352b;
      --orange: #ff6b2b;
      --mint: #91e6ce;
      --gold: #d9b76a;
      --blue: #6ea8ff;
      --dark: #0e1211;
      --panel: rgba(255, 252, 244, 0.84);
      --shadow: 0 34px 110px rgba(16, 19, 18, 0.18);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--ink);
    }

    .deck {
      display: grid;
      grid-template-rows: 1fr auto;
      width: 100vw;
      height: 100vh;
    }

    .slides {
      position: relative;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: none;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding: 42px 70px 32px;
      background:
        radial-gradient(circle at 18% 10%, rgba(255, 107, 43, 0.12), transparent 28%),
        linear-gradient(145deg, rgba(247, 243, 234, 0.98), rgba(235, 230, 219, 0.96));
      color: var(--ink);
    }

    .slide.active { display: grid; }

    .slide.dark {
      background:
        radial-gradient(circle at 86% 12%, rgba(145, 230, 206, 0.18), transparent 26%),
        radial-gradient(circle at 12% 86%, rgba(255, 107, 43, 0.14), transparent 30%),
        linear-gradient(145deg, #0a0d0c, #151b19);
      color: #fff9ed;
    }

    .slide.hero {
      background:
        linear-gradient(90deg, rgba(8, 10, 10, 0.90), rgba(8, 10, 10, 0.48)),
        url("pitch-assets/wascosa-kalikai.png") center / cover;
      color: #fff9ed;
    }

    .topbar,
    .footer,
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 6px;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 18px;
      background: color-mix(in srgb, currentColor 6%, transparent);
      backdrop-filter: blur(16px);
      font-weight: 900;
    }

    .brand img {
      width: 132px;
      height: 50px;
      object-fit: contain;
      border-radius: 12px;
      background: #fff;
    }

    .switches {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .mode-switch,
    .lang-switch {
      display: inline-flex;
      gap: 4px;
      padding: 5px;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 999px;
      background: color-mix(in srgb, currentColor 6%, transparent);
      backdrop-filter: blur(14px);
    }

    button {
      border: 0;
      border-radius: 999px;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }

    .mode-switch button,
    .lang-switch button,
    .controls button {
      padding: 9px 12px;
      color: inherit;
      background: transparent;
      font-size: 13px;
    }

    .mode-switch button.active,
    .lang-switch button.active {
      background: var(--mint);
      color: var(--ink);
    }

    .content {
      display: grid;
      align-content: center;
      gap: 26px;
      min-height: 0;
    }

    .kicker {
      display: inline-flex;
      width: fit-content;
      color: var(--orange);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dark .kicker,
    .hero .kicker { color: var(--mint); }

    .title-rule {
      width: 118px;
      height: 5px;
      margin: 22px 0 20px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--orange), var(--mint));
    }

    h1,
    h2,
    p { margin: 0; }

    h1 {
      max-width: 1120px;
      font-size: clamp(62px, 7.7vw, 112px);
      line-height: 0.92;
    }

    h2 {
      max-width: 1180px;
      font-size: clamp(42px, 5.4vw, 78px);
      line-height: 0.98;
    }

    .lead {
      max-width: 900px;
      color: color-mix(in srgb, currentColor 72%, transparent);
      font-size: 23px;
      line-height: 1.36;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(420px, 0.98fr);
      gap: 42px;
      align-items: center;
    }

    .cards,
    .steps,
    .benefits {
      display: grid;
      gap: 14px;
    }

    .cards { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .benefits { grid-template-columns: repeat(5, minmax(0, 1fr)); }

    .card,
    .step,
    .quote,
    .demo-panel {
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .dark .card,
    .dark .step,
    .dark .quote,
    .dark .demo-panel,
    .hero .card {
      background: rgba(255, 249, 237, 0.08);
      color: #fff9ed;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.28);
    }

    .card,
    .step {
      display: grid;
      gap: 12px;
      min-height: 158px;
      padding: 22px;
    }

    .card strong,
    .step strong {
      font-size: 22px;
      line-height: 1.1;
    }

    .card span,
    .step span,
    .notes {
      color: color-mix(in srgb, currentColor 66%, transparent);
      font-size: 16px;
      line-height: 1.42;
    }

    .benefit {
      display: grid;
      gap: 9px;
      min-height: 142px;
      padding: 18px;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 14px;
      background: color-mix(in srgb, currentColor 5%, transparent);
    }

    .benefit b {
      color: var(--orange);
      font-size: 13px;
      text-transform: uppercase;
    }

    .dark .benefit b { color: var(--mint); }
    .benefit span { color: color-mix(in srgb, currentColor 66%, transparent); font-size: 15px; line-height: 1.36; }

    .jenga {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 8px;
      min-height: 500px;
      align-content: center;
      perspective: 900px;
    }

    .block-row {
      display: grid;
      grid-template-columns: repeat(3, 128px);
      gap: 8px;
      transform: rotateX(0deg);
    }

    .block-row:nth-child(even) { transform: translateX(14px); }

    .block {
      height: 38px;
      border-radius: 8px;
      background: linear-gradient(135deg, #e8d3a0, #b98a4d);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.34), 0 14px 26px rgba(0,0,0,0.18);
    }

    .missing {
      background: repeating-linear-gradient(45deg, rgba(225,53,43,0.18), rgba(225,53,43,0.18) 8px, transparent 8px, transparent 16px);
      border: 1px dashed rgba(225,53,43,0.82);
      box-shadow: none;
    }

    .brace {
      position: absolute;
      inset: auto auto 70px 50%;
      width: 430px;
      height: 110px;
      transform: translateX(-50%);
      border: 2px solid var(--mint);
      border-top: 0;
      border-radius: 0 0 28px 28px;
      opacity: 0.82;
    }

    .jenga-photo,
    .divider-art {
      position: relative;
      min-height: 500px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, currentColor 16%, transparent);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.04)),
        radial-gradient(circle at 52% 10%, rgba(255,255,255,0.72), transparent 24%),
        linear-gradient(145deg, #dcc18b, #a46e37);
      box-shadow: var(--shadow);
    }

    .jenga-photo::before,
    .divider-art::before {
      content: "";
      position: absolute;
      inset: 62px 88px 54px;
      background:
        linear-gradient(90deg, transparent 0 8%, rgba(80,48,22,0.16) 8% 10%, transparent 10% 35%, rgba(80,48,22,0.12) 35% 37%, transparent 37% 65%, rgba(80,48,22,0.14) 65% 67%, transparent 67%),
        repeating-linear-gradient(0deg, #deb56f 0 30px, #c9954f 30px 36px, #e5c17f 36px 66px, #b87a3e 66px 72px);
      border-radius: 14px;
      transform: rotate(-1.8deg);
      box-shadow: 0 32px 80px rgba(61, 37, 19, 0.28);
    }

    .jenga-photo::after {
      content: "critical block unknown";
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%) rotate(-1.8deg);
      padding: 10px 16px;
      border: 1px dashed rgba(225, 53, 43, 0.9);
      border-radius: 10px;
      background: rgba(255, 249, 237, 0.86);
      color: var(--red);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .divider-layout {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(420px, 0.72fr);
      gap: 46px;
      align-items: center;
    }

    .divider-title {
      font-size: clamp(72px, 8vw, 128px);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .divider-art {
      min-height: 430px;
      background:
        linear-gradient(145deg, rgba(255,249,237,0.86), rgba(221,202,162,0.72)),
        radial-gradient(circle at 50% 16%, rgba(255,255,255,0.72), transparent 26%);
    }

    .impact-map,
    .document-map,
    .layer-map {
      position: relative;
      min-height: 460px;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 28px;
      background: color-mix(in srgb, currentColor 5%, transparent);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .impact-core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 190px;
      height: 190px;
      transform: translate(-50%, -50%);
      border: 2px dashed var(--red);
      border-radius: 999px;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(225, 53, 43, 0.08);
      color: var(--red);
      text-align: center;
      font-weight: 950;
    }

    .impact-ring {
      position: absolute;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 999px;
      transform: translate(-50%, -50%);
      left: 50%;
      top: 50%;
    }

    .impact-r1 { width: 330px; height: 230px; }
    .impact-r2 { width: 520px; height: 340px; }
    .impact-r3 { width: 680px; height: 430px; opacity: 0.56; }

    .impact-label,
    .doc-fragment,
    .layer-chip {
      position: absolute;
      padding: 12px 14px;
      border: 1px solid color-mix(in srgb, currentColor 17%, transparent);
      border-radius: 14px;
      background: rgba(255, 252, 244, 0.86);
      font-size: 14px;
      font-weight: 850;
      line-height: 1.22;
    }

    .i-a { left: 8%; top: 12%; }
    .i-b { right: 8%; top: 14%; }
    .i-c { left: 7%; bottom: 14%; }
    .i-d { right: 9%; bottom: 12%; }
    .i-e { left: 50%; bottom: 5%; transform: translateX(-50%); }

    .document-map {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      padding: 28px;
      align-content: center;
    }

    .doc-fragment {
      position: static;
      min-height: 118px;
      background: rgba(255, 252, 244, 0.92);
    }

    .doc-fragment b {
      display: block;
      margin-bottom: 8px;
      color: var(--orange);
      font-size: 12px;
      text-transform: uppercase;
    }

    .layer-map {
      min-height: 500px;
      background:
        radial-gradient(circle at 50% 50%, rgba(145,230,206,0.22), transparent 17%),
        radial-gradient(circle at 26% 28%, rgba(217,183,106,0.20), transparent 13%),
        radial-gradient(circle at 74% 30%, rgba(110,168,255,0.18), transparent 12%),
        rgba(255, 252, 244, 0.46);
    }

    .layer-orbit {
      position: absolute;
      inset: 42px;
      border: 1px dashed color-mix(in srgb, currentColor 22%, transparent);
      border-radius: 999px;
    }

    .layer-orbit.o2 { inset: 104px 94px; transform: rotate(-8deg); }
    .layer-orbit.o3 { inset: 166px 164px; transform: rotate(13deg); }

    .layer-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 210px;
      min-height: 110px;
      display: grid;
      place-items: center;
      padding: 18px;
      border-radius: 24px;
      background: #101312;
      color: #fff9ed;
      text-align: center;
      font-weight: 950;
      box-shadow: 0 24px 80px rgba(16,19,18,0.22);
    }

    .l-a { left: 6%; top: 12%; }
    .l-b { right: 8%; top: 12%; }
    .l-c { left: 7%; top: 44%; }
    .l-d { right: 6%; top: 44%; }
    .l-e { left: 19%; bottom: 8%; }
    .l-f { right: 18%; bottom: 8%; }
    .l-g { left: 50%; top: 8%; transform: translateX(-50%); }
    .l-h { left: 50%; bottom: 6%; transform: translateX(-50%); }

    .arch small {
      display: block;
      margin-top: 10px;
      color: color-mix(in srgb, currentColor 58%, transparent);
      font-size: 12px;
      line-height: 1.3;
      text-transform: none;
      letter-spacing: 0;
    }

    .demo.screens {
      grid-template-columns: minmax(0, 0.72fr) minmax(0, 1.28fr);
      align-items: center;
    }

    .screen-stack {
      position: relative;
      min-height: 420px;
    }

    .screen-shot {
      position: absolute;
      width: 72%;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 18px;
      overflow: hidden;
      background: #101312;
      box-shadow: 0 24px 80px rgba(16,19,18,0.24);
    }

    .screen-shot img {
      display: block;
      width: 100%;
      height: auto;
    }

    .screen-a { left: 0; top: 0; }
    .screen-b { right: 0; top: 84px; }
    .screen-c { left: 13%; bottom: 0; }

    .concept-fabric {
      position: relative;
      min-height: 470px;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 32%, rgba(145, 230, 206, 0.30), transparent 9%),
        radial-gradient(circle at 44% 18%, rgba(255, 107, 43, 0.22), transparent 9%),
        radial-gradient(circle at 72% 38%, rgba(110, 168, 255, 0.26), transparent 10%),
        radial-gradient(circle at 36% 70%, rgba(217, 183, 106, 0.28), transparent 9%),
        radial-gradient(circle at 78% 74%, rgba(145, 230, 206, 0.20), transparent 8%),
        rgba(255, 249, 237, 0.06);
    }

    .concept-fabric::before,
    .concept-fabric::after {
      content: "";
      position: absolute;
      inset: 13%;
      border: 1px dashed color-mix(in srgb, currentColor 28%, transparent);
      border-radius: 999px;
      transform: rotate(-10deg);
    }

    .concept-fabric::after {
      inset: 25% 10%;
      transform: rotate(18deg);
    }

    .node {
      position: absolute;
      display: grid;
      place-items: center;
      width: 132px;
      min-height: 68px;
      padding: 12px;
      border: 1px solid color-mix(in srgb, currentColor 22%, transparent);
      border-radius: 18px;
      background: rgba(255, 249, 237, 0.12);
      text-align: center;
      font-size: 13px;
      font-weight: 850;
      line-height: 1.16;
      backdrop-filter: blur(12px);
    }

    .n-a { top: 12%; left: 10%; }
    .n-b { top: 8%; right: 16%; }
    .n-c { top: 42%; left: 35%; }
    .n-d { bottom: 14%; left: 12%; }
    .n-e { bottom: 12%; right: 12%; }

    .architecture {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .arch {
      position: relative;
      display: grid;
      align-content: center;
      gap: 8px;
      min-height: 210px;
      padding: 22px;
      border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
      border-radius: 16px;
      background: color-mix(in srgb, currentColor 7%, transparent);
      text-align: center;
    }

    .arch:not(:last-child)::after {
      content: ">";
      position: absolute;
      top: 50%;
      right: -12px;
      color: var(--mint);
      font-weight: 900;
      transform: translateY(-50%);
    }

    .arch b { color: var(--mint); font-size: 14px; text-transform: uppercase; }
    .arch span { color: color-mix(in srgb, currentColor 68%, transparent); font-size: 14px; line-height: 1.34; }

    .demo {
      display: grid;
      grid-template-columns: minmax(0, 0.88fr) minmax(0, 1.12fr);
      gap: 22px;
    }

    .demo-panel {
      display: grid;
      gap: 12px;
      min-height: 390px;
      padding: 22px;
      align-content: start;
    }

    .demo-line {
      padding: 14px 16px;
      border-radius: 12px;
      background: color-mix(in srgb, currentColor 7%, transparent);
      color: color-mix(in srgb, currentColor 74%, transparent);
      font-size: 16px;
      line-height: 1.36;
    }

    .demo-line strong { color: var(--mint); }

    .quote {
      max-width: 980px;
      padding: 34px;
      border-left: 8px solid var(--orange);
      font-size: clamp(34px, 4.2vw, 60px);
      line-height: 1.05;
      font-weight: 900;
    }

    .notes {
      max-width: 920px;
      padding-top: 4px;
      font-size: 14px;
      display: none;
    }

    .footer {
      justify-content: space-between;
      color: color-mix(in srgb, currentColor 70%, transparent);
      font-size: 12px;
      font-weight: 760;
    }

    .wascosa-signature,
    .eraneos-signature {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      opacity: 0.86;
    }

    .wascosa-signature img {
      width: 104px;
      max-height: 24px;
      object-fit: contain;
      filter: grayscale(1) contrast(1.18);
    }

    .eraneos-signature img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .dark .wascosa-signature img,
    .hero .wascosa-signature img,
    .dark .eraneos-signature img,
    .hero .eraneos-signature img {
      filter: grayscale(1) invert(1) contrast(1.18);
    }

    .eraneos-signature strong {
      color: currentColor;
      font-size: 12px;
      font-weight: 900;
    }

    .eraneos-signature span {
      color: color-mix(in srgb, currentColor 64%, transparent);
    }

    .controls {
      border-top: 1px solid rgba(255, 249, 237, 0.12);
      background: rgba(8, 10, 10, 0.92);
      color: #fff9ed;
      padding: 10px 18px;
    }

    .controls button {
      min-width: 100px;
      border: 1px solid rgba(255, 249, 237, 0.18);
      background: rgba(255, 249, 237, 0.08);
    }

    .progress {
      flex: 1;
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 249, 237, 0.13);
    }

    .progress span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--orange), var(--mint));
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .deck, .slides, .slide { display: block; height: auto; min-height: 100vh; }
      .slide { position: static; display: none; padding: 28px 20px; }
      .slide.active { display: block; }
      .split, .cards, .benefits, .architecture, .demo { grid-template-columns: 1fr; }
      h1 { font-size: 48px; }
      h2 { font-size: 38px; }
      .lead { font-size: 19px; }
      .jenga { transform: scale(0.78); transform-origin: top center; min-height: 420px; }
    }
  </style>
</head>
<body>
  <main class="deck">
    <section id="slides" class="slides" aria-live="polite"></section>
    <nav class="controls" aria-label="Presentation controls">
      <button type="button" id="prevBtn">Previous</button>
      <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
      <span id="slideCounter">1 / 12</span>
      <button type="button" id="nextBtn">Next</button>
    </nav>
  </main>

  <script>
    const assets = {
      meidsLogo: "pitch-assets/meids-logo.svg",
      wascosa: "pitch-assets/wascosa-logo.svg",
      eraneos: "pitch-assets/eraneos-mark.png",
      chatUi: "pitch-assets/meids-chat-ui.png",
      answerUi: "pitch-assets/meids-answer-ui.png",
      knowledgeUi: "pitch-assets/meids-knowledge-ui.png",
    };

    const decks = {
      wascosa: {
        label: "Wascosa / cargo rail",
        slides: [
          {
            type: "hero",
            kicker: "Wascosa Circle Event",
            title: "What leaves when the expert leaves?",
            lead: "In cargo rail, the dangerous loss is not only headcount. It is the invisible judgement that keeps complex systems structurally intact.",
            tags: ["Expert knowledge risk", "Compound knowledge fabric", "MeIDs intellectual twin", "Wascosa-ready pilot"],
            note: "Open with one person, one story. Do not explain technology yet. Make the room feel the knowledge-loss problem before naming the solution.",
          },
          {
            type: "divider",
            kicker: "Chapter 1",
            title: "The Jenga Problem",
            lead: "Before we talk about twins, we need to see why expert knowledge loss is structurally dangerous.",
            note: "Use this divider to reset attention and make the Jenga analogy the story spine.",
          },
          {
            type: "jenga",
            kicker: "The Jenga problem",
            title: "You do not know which knowledge block is weight-bearing.",
            lead: "Organizations behave like Jenga towers. Remove one expert, one dispatcher, one maintenance authority, one commercial memory - and you often discover too late whether that block held the structure.",
            note: "Pause on the missing block. This is the core analogy: when it comes to expert knowledge, you do not know what you no longer know.",
          },
          {
            type: "impact",

        lead: "Waehlen Sie einen kritischen Experten, eine Entscheidungsdomaene, einen gesteuerten Skill und einen messbaren Pilot. Beweisen Sie, dass Urteil bewahrt, aktiviert und verbessert werden kann.",
        tags: ["Experte", "Domaene", "Quellen", "Skill", "Messung"],
      },
    ];

    let mode = "wascosa";
    let lang = "en";
    let index = 0;

    const slidesRoot = document.getElementById("slides");
    const counter = document.getElementById("slideCounter");
    const progress = document.getElementById("progressBar");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function esc(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[char]));
    }

    function renderTopbar(slide) {
      return `
        <header class="topbar">
          <div class="brand">
            <img src="${assets.meidsLogo}" alt="MeIDs Intellectual Twin logo">
          </div>
          <div class="switches">
            <div class="mode-switch" aria-label="Deck mode">
              ${Object.entries(decks).map(([key, deck]) => `<button type="button" class="${key === mode ? "active" : ""}" data-mode="${key}">${esc(lang === "de" ? deck.labelDe : deck.label)}</button>`).join("")}
            </div>
            <div class="lang-switch" aria-label="Language">
              <button type="button" class="${lang === "en" ? "active" : ""}" data-lang="en">EN</button>
              <button type="button" class="${lang === "de" ? "active" : ""}" data-lang="de">DE</button>
            </div>
          </div>
        </header>
      `;
    }

    function renderJenga() {
      const rows = Array.from({ length: 8 }, (_, row) => `
        <div class="block-row">
          ${Array.from({ length: 3 }, (_, col) => `<span class="block ${row === 3 && col === 1 ? "missing" : ""}"></span>`).join("")}
        </div>
      `).join("");
      return `<div class="jenga">${rows}<span class="brace" aria-hidden="true"></span></div>`;
    }

    function renderJengaPhoto() {
      return `<div class="jenga-photo" role="img" aria-label="Permitted created visual of an unstable Jenga tower with one critical missing block"></div>`;
    }

    function renderDivider(slide) {
      return `
        <div class="content divider-layout">
          <div>
            <span class="kicker">${esc(slide.kicker)}</span>
            <h1 class="divider-title">${esc(slide.title)}</h1>
            <p class="lead">${esc(slide.lead)}</p>
          </div>
          <div class="divider-art" role="img" aria-label="Jenga tower chapter visual"></div>
          <p class="notes">${esc(slide.note)}</p>
        </div>
      `;
    }

    function renderImpact(slide) {
      return `
        <div class="content split">
          <div>
            <span class="kicker">${esc(slide.kicker)}</span>
            <h2>${esc(slide.title)}</h2>
            <p class="lead">${esc(slide.lead)}</p>
            <p class="notes">${esc(slide.note)}</p>
          </div>
          <div class="impact-map">
            <span class="impact-ring impact-r1"></span>
            <span class="impact-ring impact-r2"></span>
            <span class="impact-ring impact-r3"></span>
            <div class="impact-core">missing critical knowledge</div>
            ${(slide.impacts || []).map((label, i) => `<span class="impact-label i-${["a", "b", "c", "d", "e"][i]}">${esc(label)}</span>`).join("")}
          </div>
        </div>
      `;
    }

    function renderDocuments(slide) {
      return `
        <div class="content">
          <span class="kicker">${esc(slide.kicker)}</span>
          <h2>${esc(slide.title)}</h2>
          <div class="document-map">
            ${slide.cards.map((card) => `<div class="doc-fragment"><b>${esc(card[0])}</b>${esc(card[1])}</div>`).join("")}
          </div>
          <p class="notes">${esc(slide.note)}</p>
        </div>
      `;
    }

    function renderFabric(slide) {
      const labels = slide.nodes || [];
      return `
        <div class="layer-map">
          <span class="layer-orbit"></span>
          <span class="layer-orbit o2"></span>
          <span class="layer-orbit o3"></span>
          <div class="layer-center">Actor agent<br>Twin judgement</div>
          ${labels.map((label, i) => `<span class="layer-chip l-${["a", "b", "c", "d", "e", "f", "g", "h"][i]}">${esc(label)}</span>`).join("")}
        </div>
      `;
    }

    function renderDemoScreens(slide) {
      const shots = slide.screenshots || [];
      return `
        <div class="screen-stack" aria-label="MeIDs twin interface screenshots">
          ${shots.map((src, i) => `<figure class="screen-shot screen-${["a", "b", "c"][i]}"><img src="${esc(src)}" alt="MeIDs twin interface screenshot ${i + 1}"></figure>`).join("")}
        </div>
      `;
    }

    function renderBody(slide) {
      if (slide.type === "hero" || slide.type === "final") {
        return `
          <div class="content">
            <span class="kicker">${esc(slide.kicker)}</span>
            <h1>${esc(slide.title)}</h1>
            <p class="lead">${esc(slide.lead)}</p>
            ${renderTags(slide.tags)}
            <p class="notes">${esc(slide.note)}</p>
          </div>
        `;
      }
      if (slide.type === "divider") {
        return renderDivider(slide);
      }
      if (slide.type === "jenga") {
        return `
          <div class="content split">
            <div>
              <span class="kicker">${esc(slide.kicker)}</span>
              <h2>${esc(slide.title)}</h2>
              <div class="title-rule" aria-hidden="true"></div>
              <p class="lead">${esc(slide.lead)}</p>
              <p class="notes">${esc(slide.note)}</p>
            </div>
            ${renderJengaPhoto()}
          </div>
        `;
      }
      if (slide.type === "impact") {
        return renderImpact(slide);
      }
      if (slide.type === "quote") {
        return `
          <div class="content">
            <span class="kicker">${esc(slide.kicker)}</span>
            <div class="quote">${esc(slide.quote)}</div>
            <p class="notes">${esc(slide.note)}</p>
          </div>
        `;
      }
      if (slide.type === "cards") {
        return `
          <div class="content">
            <span class="kicker">${esc(slide.kicker)}</span>
            <h2>${esc(slide.title)}</h2>
            <div class="cards">${slide.cards.map((card) => `<div class="card"><strong>${esc(card[0])}</strong><span>${esc(card[1])}</span></div>`).join("")}</div>
            <p class="notes">${esc(slide.note)}</p>
          </div>
        `;
      }
      if (slide.type === "documents") {
        return renderDocuments(slide);
      }
      if (slide.type === "fabric") {
        return `
          <div class="content split">
            <div>
              <span class="kicker">${esc(slide.kicker)}</span>
              <h2>${esc(slide.title)}</h2>
              <p class="lead">${esc(slide.lead)}</p>
              <p class="notes">${esc(slide.note)}</p>
            </div>
            ${renderFabric(slide)}
          </div>
        `;
      }
      if (slide.type === "architecture") {
        return `
          <div class="content">
            <span class="kicker">${esc(slide.kicker)}</span>
            <h2>${esc(slide.title)}</h2>
            <div class="architecture">${slide.steps.map((step) => `<div class="arch"><b>${esc(step[0])}</b><span>${esc(step[1])}</span>${step[2] ? `<small>${esc(step[2])}</small>` : ""}</div>`).join("")}</div>
            <p class="notes">${esc(slide.note)}</p>
          </div>
        `;
      }
      if (slide.type === "benefits") {
        return `
          <div class="content">
            <span class="kicker">${esc(slide.kicker)}</span>
            <h2>${esc(slide.title)}</h2>
            <div class="benefits">${slide.benefits.map((benefit) => `<div class="benefit"><b>${esc(benefit[0])}</b><span>${esc(benefit[1])}</span></div>`).join("")}</div>
            <p class="notes">${esc(slide.note)}</p>
          </div>
        `;
      }
      if (slide.type === "demo") {
        return `
          <div class="content">
            <span class="kicker">${esc(slide.kicker)}</span>
            <h2>${esc(slide.title)}</h2>
            ${slide.lead ? `<p class="lead">${esc(slide.lead)}</p>` : ""}
            <div class="demo ${slide.screenshots ? "screens" : ""}">
              <div class="demo-panel">
                <strong>Input context</strong>
                ${slide.input.map((line) => `<div class="demo-line">${esc(line)}</div>`).join("")}
              </div>
              ${slide.screenshots ? renderDemoScreens(slide) : `<div class="demo-panel">
                <strong>Twin output</strong>
                ${slide.output.map((line) => `<div class="demo-line"><strong>${esc(line[0])}</strong><br>${esc(line[1])}</div>`).join("")}
              </div>`}
            </div>
            <p class="notes">${esc(slide.note)}</p>
          </div>
        `;
      }
      return "";
    }

    function renderTags(tags = []) {
      return `<div class="tagline">${tags.map((tag) => `<span>${esc(tag)}</span>`).join("")}</div>`;
    }

    function renderFooter(slide, slideIndex, total) {
      return `
        <footer class="footer">
          <span class="wascosa-signature"><img src="${assets.wascosa}" alt="Wascosa logo"></span>
          <span class="eraneos-signature"><img src="${assets.eraneos}" alt="Eraneos mark"><strong>eraneos</strong><span>enabling innovation</span></span>
        </footer>
      `;
    }

    function currentSlides() {
      const current = decks[mode];
      return lang === "de" ? current.deSlides : current.slides;
    }

    function renderDeck() {
      const current = decks[mode];
      const slides = currentSlides();
      slidesRoot.innerHTML = slides.map((slide, slideIndex) => `
        <article class="slide ${slide.dark ? "dark" : ""} ${slide.type === "hero" ? "hero" : ""} ${slideIndex === index ? "active" : ""}">
          ${renderTopbar(slide)}
          ${renderBody(slide)}
          ${renderFooter(slide, slideIndex, slides.length)}
        </article>
      `).join("");
      counter.textContent = `${index + 1} / ${slides.length}`;
      progress.style.width = `${((index + 1) / slides.length) * 100}%`;
      prevBtn.textContent = lang === "de" ? "Zurueck" : "Previous";
      nextBtn.textContent = lang === "de" ? "Weiter" : "Next";
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.addEventListener("click", () => {
          mode = button.dataset.mode;
          index = 0;
          renderDeck();
        });
      });
      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => {
          lang = button.dataset.lang;
          index = 0;
          renderDeck();
        });
      });
    }

    function showSlide(nextIndex) {
      const total = currentSlides().length;
      index = Math.max(0, Math.min(total - 1, nextIndex));
      renderDeck();
    }

    prevBtn.addEventListener("click", () => showSlide(index - 1));
    nextBtn.addEventListener("click", () => showSlide(index + 1));
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") showSlide(index + 1);
      if (event.key === "ArrowLeft" || event.key === "PageUp") showSlide(index - 1);
      if (event.key === "1") { mode = "wascosa"; index = 0; renderDeck(); }
      if (event.key === "2") { mode = "generic"; index = 0; renderDeck(); }
      if (event.key.toLowerCase() === "e") { lang = "en"; index = 0; renderDeck(); }
      if (event.key.toLowerCase() === "d") { lang = "de"; index = 0; renderDeck(); }
    });

    renderDeck();
  </script>
</body>
</html>
