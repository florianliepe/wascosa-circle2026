<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intellectual Twin x Wascosa Circle Event Hamburg 2026</title>
  <style>
    :root {
      --ink: #111514;
      --muted: #69736f;
      --paper: #f6f4ee;
      --card: #fffdfa;
      --line: #d9ded6;
      --accent: #ff5a1f;
      --mint: #95e4c9;
      --wascosa: #e1352b;
      --deep: #172222;
      --shadow: 0 28px 90px rgba(17, 21, 20, 0.14);
      --font: Inter, "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font);
    }

    body { overflow: hidden; }

    .deck {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .slides {
      position: relative;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: none;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
      padding: 42px 58px 34px;
      background:
        linear-gradient(120deg, rgba(255, 90, 31, 0.05), transparent 36%),
        linear-gradient(180deg, rgba(255, 253, 250, 0.78), rgba(246, 244, 238, 0.94)),
        var(--paper);
    }

    .slide.active { display: grid; }

    .slide.dark {
      background:
        radial-gradient(circle at 88% 8%, rgba(149, 228, 201, 0.20), transparent 26%),
        linear-gradient(140deg, #0f1514, #172222);
      color: #fffaf2;
    }

    .slide.hero {
      background:
        linear-gradient(90deg, rgba(17, 21, 20, 0.92), rgba(17, 21, 20, 0.54)),
        url("pitch-assets/wascosa-kalikai.png") center / cover;
      color: #fffaf2;
    }

    .topbar,
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 42px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-box {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 8px 12px;
      border: 1px solid rgba(17, 21, 20, 0.12);
      border-radius: 18px;
      background: rgba(255, 253, 250, 0.76);
      backdrop-filter: blur(14px);
      color: var(--ink);
      font-weight: 860;
    }

    .slide.dark .brand-box,
    .slide.hero .brand-box {
      border-color: rgba(255, 250, 242, 0.20);
      background: rgba(255, 250, 242, 0.08);
      color: #fffaf2;
    }

    .brand-box img {
      display: block;
      width: 102px;
      height: auto;
      max-height: 32px;
      object-fit: contain;
    }

    .meids-mark img {
      width: 34px;
      height: 34px;
      padding: 4px;
      border: 1px solid currentColor;
      border-radius: 10px;
      background: #050707;
    }

    .lang-toggle {
      display: flex;
      gap: 6px;
      padding: 5px;
      border: 1px solid rgba(17, 21, 20, 0.14);
      border-radius: 999px;
      background: rgba(255, 253, 250, 0.72);
      backdrop-filter: blur(16px);
    }

    .slide.dark .lang-toggle,
    .slide.hero .lang-toggle {
      border-color: rgba(255, 250, 242, 0.20);
      background: rgba(255, 250, 242, 0.08);
    }

    .lang-toggle button,
    .controls button {
      border: 0;
      border-radius: 999px;
      color: inherit;
      font: inherit;
      font-size: 13px;
      font-weight: 850;
      cursor: pointer;
    }

    .lang-toggle button {
      padding: 8px 12px;
      background: transparent;
      color: var(--muted);
    }

    .slide.dark .lang-toggle button,
    .slide.hero .lang-toggle button { color: rgba(255, 250, 242, 0.70); }

    .lang-toggle button.active {
      background: var(--ink);
      color: #fffaf2;
    }

    .slide.dark .lang-toggle button.active,
    .slide.hero .lang-toggle button.active {
      background: var(--mint);
      color: var(--ink);
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 880;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .slide.dark .eyebrow,
    .slide.hero .eyebrow { color: var(--mint); }

    h1,
    h2,
    h3,
    p { margin: 0; }

    h1 {
      max-width: 1040px;
      font-size: clamp(58px, 7vw, 104px);
      line-height: 0.93;
      letter-spacing: 0;
    }

    h2 {
      max-width: 1100px;
      font-size: clamp(42px, 5vw, 74px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    h3 {
      font-size: 23px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .lead {
      max-width: 850px;
      color: color-mix(in srgb, currentColor 72%, transparent);
      font-size: 23px;
      line-height: 1.42;
    }

    .slide.dark .lead,
    .slide.hero .lead { color: rgba(255, 250, 242, 0.78); }

    .content {
      display: grid;
      align-content: center;
      gap: 28px;
      min-height: 0;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 0.72fr);
      gap: 28px;
      align-items: stretch;
    }

    .grid-3,
    .grid-5,
    .faq-grid {
      display: grid;
      gap: 16px;
    }

    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .faq-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .panel,
    .mini,
    .faq {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 253, 250, 0.78);
      box-shadow: var(--shadow);
    }

    .slide.dark .panel,
    .slide.dark .mini,
    .slide.dark .faq,
    .slide.hero .panel,
    .slide.hero .mini,
    .slide.hero .faq {
      border-color: rgba(255, 250, 242, 0.18);
      background: rgba(255, 250, 242, 0.08);
      color: #fffaf2;
    }

    .panel { padding: 28px; }

    .mini {
      display: grid;
      gap: 12px;
      min-height: 178px;
      padding: 24px;
      box-shadow: none;
    }

    .num {
      display: inline-grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 999px;
      background: var(--ink);
      color: #fffaf2;
      font-size: 13px;
      font-weight: 900;
    }

    .slide.dark .num,
    .slide.hero .num {
      background: var(--mint);
      color: var(--ink);
    }

    .mini p,
    .faq p,
    .feature p {
      color: color-mix(in srgb, currentColor 68%, transparent);
      font-size: 16px;
      line-height: 1.42;
    }

    .rail-map {
      position: relative;
      min-height: 430px;
      overflow: hidden;
      background:
        linear-gradient(150deg, rgba(23, 34, 34, 0.94), rgba(23, 34, 34, 0.67)),
        url("pitch-assets/wascosa-kalikai.png") center / cover;
      color: #fffaf2;
    }

    .rail-map::before,
    .rail-map::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      height: 4px;
      border-radius: 999px;
      background: repeating-linear-gradient(90deg, #fffaf2 0 24px, transparent 24px 44px);
      opacity: 0.50;
    }

    .rail-map::before { top: 38%; transform: rotate(-8deg); }
    .rail-map::after { top: 58%; transform: rotate(7deg); }

    .rail-node {
      position: absolute;
      display: grid;
      gap: 4px;
      width: 166px;
      padding: 12px;
      border: 1px solid rgba(255, 250, 242, 0.24);
      border-radius: 14px;
      background: rgba(17, 21, 20, 0.66);
      backdrop-filter: blur(10px);
    }

    .rail-node b { color: var(--mint); font-size: 13px; }
    .rail-node span { color: rgba(255, 250, 242, 0.78); font-size: 12px; line-height: 1.28; }
    .n1 { top: 13%; left: 8%; }
    .n2 { top: 13%; right: 8%; }
    .n3 { top: 44%; left: 23%; }
    .n4 { bottom: 8%; right: 8%; }
    .n5 { bottom: 8%; left: 8%; }

    .question {
      padding: 34px;
      border-left: 8px solid var(--accent);
      background: rgba(255, 253, 250, 0.82);
    }

    .slide.dark .question {
      border-color: var(--mint);
      background: rgba(255, 250, 242, 0.08);
    }

    .question strong {
      display: block;
      max-width: 1100px;
      font-size: clamp(34px, 4.45vw, 62px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .question + .lead {
      max-width: 1180px;
      font-size: 21px;
      line-height: 1.34;
    }

    .feature-list { display: grid; gap: 8px; }

    .feature {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 18px;
      align-items: start;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .slide.dark .feature { border-color: rgba(255, 250, 242, 0.16); }

    .feature b {
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .slide.dark .feature b { color: var(--mint); }

    .platform {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 18px;
      border: 1px solid rgba(255, 250, 242, 0.16);
      border-radius: 22px;
      background: rgba(255, 250, 242, 0.06);
    }

    .layer {
      display: grid;
      min-height: 108px;
      align-content: center;
      gap: 8px;
      border: 1px solid rgba(255, 250, 242, 0.16);
      border-radius: 16px;
      padding: 18px;
      background: rgba(149, 228, 201, 0.10);
      text-align: center;
    }

    .layer strong { font-size: 18px; }
    .layer span { color: rgba(255, 250, 242, 0.68); font-size: 13px; line-height: 1.35; }

    .faq { padding: 17px; box-shadow: none; }
    .faq strong { display: block; margin-bottom: 7px; font-size: 18px; }

    .tagline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tagline span {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 250, 0.62);
      color: color-mix(in srgb, currentColor 72%, transparent);
      font-size: 13px;
      font-weight: 760;
    }

    .slide.dark .tagline span,
    .slide.hero .tagline span {
      border-color: rgba(255, 250, 242, 0.18);
      background: rgba(255, 250, 242, 0.08);
      color: rgba(255, 250, 242, 0.82);
    }

    .cinema {
      display: grid;
      grid-template-columns: minmax(0, 0.86fr) minmax(420px, 1fr);
      gap: 34px;
      align-items: stretch;
    }

    .video-stage {
      position: relative;
      min-height: 470px;
      overflow: hidden;
      border: 1px solid rgba(17, 21, 20, 0.12);
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(17, 21, 20, 0.12), rgba(17, 21, 20, 0.72)),
        url("pitch-assets/wascosa-kalikai.png") center / cover;
      box-shadow: var(--shadow);
    }

    .slide.dark .video-stage {
      border-color: rgba(255, 250, 242, 0.18);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.28);
    }

    .play-button {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .play-button span {
      display: grid;
      width: 96px;
      height: 96px;
      place-items: center;
      border: 1px solid rgba(255, 250, 242, 0.42);
      border-radius: 999px;
      background: rgba(255, 250, 242, 0.14);
      color: #fffaf2;
      font-size: 42px;
      font-weight: 900;
      backdrop-filter: blur(14px);
    }

    .video-caption {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      display: grid;
      gap: 8px;
      color: #fffaf2;
    }

    .video-caption strong { font-size: 22px; }
    .video-caption span { color: rgba(255, 250, 242, 0.76); font-size: 15px; line-height: 1.35; }

    .story-beats {
      display: grid;
      gap: 12px;
      align-content: center;
    }

    .story-beat {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 14px;
      align-items: start;
      padding: 16px 0;
      border-bottom: 1px solid color-mix(in srgb, currentColor 18%, transparent);
    }

    .story-beat b {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 999px;
      background: var(--accent);
      color: #fffaf2;
      font-size: 13px;
    }

    .story-beat strong { display: block; margin-bottom: 4px; font-size: 19px; }
    .story-beat span { color: color-mix(in srgb, currentColor 68%, transparent); font-size: 16px; line-height: 1.38; }

    .demo-shell {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
      gap: 22px;
      padding: 20px;
      border: 1px solid rgba(255, 250, 242, 0.18);
      border-radius: 20px;
      background: rgba(255, 250, 242, 0.07);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.24);
    }

    .prompt-panel,
    .result-panel {
      display: grid;
      gap: 12px;
      align-content: start;
      min-height: 420px;
      border: 1px solid rgba(255, 250, 242, 0.16);
      border-radius: 14px;
      padding: 20px;
      background: rgba(17, 21, 20, 0.42);
    }

    .prompt-line,
    .result-line {
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(255, 250, 242, 0.08);
      color: rgba(255, 250, 242, 0.82);
      font-size: 15px;
      line-height: 1.38;
    }

    .result-line strong { color: var(--mint); }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 8px;
    }

    .metric {
      display: grid;
      gap: 8px;
      min-height: 132px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 253, 250, 0.78);
    }

    .metric strong {
      color: var(--accent);
      font-size: 28px;
      line-height: 1;
    }

    .metric span {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.32;
    }

    .footer {
      color: color-mix(in srgb, currentColor 58%, transparent);
      font-size: 12px;
      font-weight: 720;
      letter-spacing: 0.02em;
    }

    .eraneos-footer {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: currentColor;
      opacity: 0.82;
    }

    .eraneos-footer img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      opacity: 0.86;
    }

    .slide.dark .eraneos-footer img,
    .slide.hero .eraneos-footer img {
      filter: invert(1);
      opacity: 0.92;
    }

    .eraneos-footer strong {
      color: currentColor;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid rgba(17, 21, 20, 0.10);
      background: rgba(246, 244, 238, 0.86);
      padding: 10px 18px;
      backdrop-filter: blur(18px);
    }

    .controls button {
      min-width: 96px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--ink);
      padding: 10px 14px;
    }

    .progress {
      flex: 1;
      height: 7px;
      border-radius: 999px;
      background: #e6e2d9;
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--mint));
      transition: width 180ms ease;
    }

    @media (max-width: 960px) {
      body { overflow: auto; }
      .deck, .slides, .slide { display: block; height: auto; min-height: 100vh; }
      .slide { position: static; display: none; padding: 28px 20px 24px; }
      .slide.active { display: block; }
      .split, .grid-3, .grid-5, .faq-grid, .platform { grid-template-columns: 1fr; }
      .cinema, .demo-shell, .metric-strip { grid-template-columns: 1fr; }
      h1 { font-size: 48px; }
      h2 { font-size: 40px; }
      .lead { font-size: 19px; }
      .controls { position: sticky; bottom: 0; }
    }

    @media print {
      body { overflow: visible; background: white; }
      .deck, .slides { display: block; height: auto; }
      .slide { position: relative; display: grid !important; width: 100vw; height: 100vh; page-break-after: always; }
      .controls, .lang-toggle { display: none; }
    }
  </style>
</head>
<body>
  <main class="deck">
    <section id="slides" class="slides" aria-live="polite"></section>
    <nav class="controls" aria-label="Presentation controls">
      <button type="button" id="prevBtn">Previous</button>
      <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
      <span id="slideCounter">1 / 12</span>
      <button type="button" id="nextBtn">Next</button>
    </nav>
  </main>

  <script>
    const assets = {

          {

            title: "Starten mit einem Experten, einer Domaene, zwoelf Monaten.",
            lead: "Das ist eine funktionierende Prototyp-Richtung, kein fertiges Fleet-Scale Produkt. Der glaubwuerdige naechste Schritt ist eine Wascosa-relevante Domaene, ein retiring oder ueberlasteter Experte, ein gesteuerter Twin, ein Skill und eine messbare Antwort, ob Urteil verantwortungsvoll erhalten werden kann.",
            tags: ["Experten waehlen", "Entscheidungsdomaene definieren", "Reale Beispiele erfassen", "Einen gesteuerten Skill bauen", "Mit Expert Review validieren"],
            footer: "Beat 10 - Vision in einen konkreten Pilot uebersetzen",
          },
        ],
      },
    };

    deck.en = keynoteDeck.en;
    deck.de = keynoteDeck.de;

    const slidesRoot = document.getElementById("slides");
    const counter = document.getElementById("slideCounter");
    const progress = document.getElementById("progressBar");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    let lang = localStorage.getItem("wascosaDeck.lang") || "de";
    let index = 0;
    let slides = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderTopbar(slide, slideIndex) {
      return `
        <header class="topbar">
          <div class="brand-row">
            ${slideIndex === 0 || slideIndex === deck[lang].slides.length - 1 ? `<div class="brand-box"><img src="${assets.wascosa}" alt="Wascosa logo"></div>` : ""}
            ${slide.theme === "hero" || slide.theme === "dark" ? `<div class="brand-box meids-mark"><img src="${assets.meids}" alt="MeIDs symbol"><strong>MeIDs</strong></div>` : ""}
          </div>
          <div class="lang-toggle" aria-label="Language">
            <button type="button" data-lang="de" class="${lang === "de" ? "active" : ""}">DE</button>
            <button type="button" data-lang="en" class="${lang === "en" ? "active" : ""}">EN</button>
          </div>
        </header>
      `;
    }

    function renderCards(items = [], gridClass = "grid-3") {
      return `<div class="${gridClass}">${items.map((item, itemIndex) => `
        <div class="mini">
          <span class="num">${itemIndex + 1}</span>
          <h3>${escapeHtml(item[0])}</h3>
          <p>${escapeHtml(item[1])}</p>
        </div>
      `).join("")}</div>`;
    }

    function renderFeatures(items = []) {
      return `<div class="feature-list panel">${items.map((item) => `
        <div class="feature">
          <b>${escapeHtml(item[0])}</b>
          <div><p>${escapeHtml(item[1])}</p></div>
        </div>
      `).join("")}</div>`;
    }

    function renderRail(slide) {
      const nodes = slide.nodes || [];
      return `<div class="panel rail-map">${nodes.map((node, nodeIndex) => `
        <div class="rail-node n${nodeIndex + 1}"><b>${escapeHtml(node[0])}</b><span>${escapeHtml(node[1])}</span></div>
      `).join("")}</div>`;
    }

    function renderLayers(items = []) {
      return `<div class="platform">${items.map((item) => `
        <div class="layer"><strong>${escapeHtml(item[0])}</strong><span>${escapeHtml(item[1])}</span></div>
      `).join("")}</div>`;
    }

    function renderFaq(items = []) {
      return `<div class="faq-grid">${items.map((item) => `
        <div class="faq"><strong>${escapeHtml(item[0])}</strong><p>${escapeHtml(item[1])}</p></div>
      `).join("")}</div>`;
    }

    function renderVideoStory(slide) {
      return `
        <div class="cinema">
          <div>
            <h2>${escapeHtml(slide.title)}</h2>
            ${slide.lead ? `<p class="lead" style="margin-top:22px">${escapeHtml(slide.lead)}</p>` : ""}
            <div class="story-beats">
              ${(slide.beats || []).map((beat, beatIndex) => `
                <div class="story-beat">
                  <b>${beatIndex + 1}</b>
                  <div><strong>${escapeHtml(beat[0])}</strong><span>${escapeHtml(beat[1])}</span></div>
                </div>
              `).join("")}
            </div>
          </div>
          <div class="video-stage">
            <div class="play-button" aria-hidden="true"><span>▶</span></div>
            <div class="video-caption"><strong>${escapeHtml(slide.videoTitle || "")}</strong><span>${escapeHtml(slide.videoCaption || "")}</span></div>
          </div>
        </div>
      `;
    }

    function renderDemo(slide) {
      return `
        <h2>${escapeHtml(slide.title)}</h2>
        ${slide.lead ? `<p class="lead">${escapeHtml(slide.lead)}</p>` : ""}
        <div class="demo-shell">
          <div class="prompt-panel">
            <h3>${escapeHtml(slide.inputTitle || "Input")}</h3>
            ${(slide.inputs || []).map((item) => `<div class="prompt-line">${escapeHtml(item)}</div>`).join("")}
          </div>
          <div class="result-panel">
            <h3>${escapeHtml(slide.outputTitle || "Twin output")}</h3>
            ${(slide.outputs || []).map((item) => `<div class="result-line"><strong>${escapeHtml(item[0])}</strong><br>${escapeHtml(item[1])}</div>`).join("")}
          </div>
        </div>
      `;
    }

    function renderMetrics(slide) {
      return `
        <h2>${escapeHtml(slide.title)}</h2>
        ${slide.lead ? `<p class="lead">${escapeHtml(slide.lead)}</p>` : ""}
        <div class="metric-strip">
          ${(slide.metrics || []).map((metric) => `<div class="metric"><strong>${escapeHtml(metric[0])}</strong><span>${escapeHtml(metric[1])}</span></div>`).join("")}
        </div>
      `;
    }

    function renderBody(slide) {
      if (slide.question) {
        return `
          <div class="question panel"><strong>${escapeHtml(slide.question)}</strong></div>
          ${slide.lead ? `<p class="lead">${escapeHtml(slide.lead)}</p>` : ""}
        `;
      }
      if (slide.videoStory) return renderVideoStory(slide);
      if (slide.demo) return renderDemo(slide);
      if (slide.metrics) return renderMetrics(slide);
      if (slide.visual === "rail") {
        return `
          <div class="split">
            <div><h2>${escapeHtml(slide.title)}</h2>${slide.lead ? `<p class="lead" style="margin-top:24px">${escapeHtml(slide.lead)}</p>` : ""}</div>
            ${renderRail(slide)}
          </div>
        `;
      }
      if (slide.layers) {
        return `<h2>${escapeHtml(slide.title)}</h2>${slide.lead ? `<p class="lead">${escapeHtml(slide.lead)}</p>` : ""}${renderLayers(slide.layers)}`;
      }
      if (slide.features) {
        return `<div class="split"><div><h2>${escapeHtml(slide.title)}</h2>${slide.lead ? `<p class="lead" style="margin-top:24px">${escapeHtml(slide.lead)}</p>` : ""}</div>${renderFeatures(slide.features)}</div>`;
      }
      if (slide.faqs) {
        return `<h2>${escapeHtml(slide.title)}</h2>${renderFaq(slide.faqs)}`;
      }
      if (slide.cards) {
        const grid = slide.cards.length >= 5 ? "grid-5" : "grid-3";
        return `<h2>${escapeHtml(slide.title)}</h2>${slide.lead ? `<p class="lead">${escapeHtml(slide.lead)}</p>` : ""}${renderCards(slide.cards, grid)}`;
      }
      return `
        <div>
          <h1>${escapeHtml(slide.title)}</h1>
          ${slide.lead ? `<p class="lead" style="margin-top:24px">${escapeHtml(slide.lead)}</p>` : ""}
        </div>
        ${slide.tags ? `<div class="tagline">${slide.tags.map((tag) => `<span>${escapeHtml(tag)}</span>`).join("")}</div>` : ""}
      `;
    }

    function renderFooter(slide, slideIndex) {
      return `
        <footer class="footer">
          <span class="eraneos-footer"><img src="${assets.eraneos}" alt="Eraneos mark"><strong>eraneos</strong><span>${escapeHtml(deck[lang].footerPrefix)}</span></span>
          <span>${escapeHtml(slide.footer || "")} · ${slideIndex + 1} / ${deck[lang].slides.length}</span>
        </footer>
      `;
    }

    function renderDeck() {
      const current = deck[lang];
      document.documentElement.lang = lang;
      prevBtn.textContent = current.prev;
      nextBtn.textContent = current.next;
      slidesRoot.innerHTML = current.slides.map((slide, slideIndex) => `
        <article class="slide ${escapeHtml(slide.theme || "")} ${slideIndex === index ? "active" : ""}">
          ${renderTopbar(slide, slideIndex)}
          <div class="content">
            <span class="eyebrow">${escapeHtml(slide.eyebrow)}</span>
            ${renderBody(slide)}
          </div>
          ${renderFooter(slide, slideIndex)}
        </article>
      `).join("");
      slides = Array.from(document.querySelectorAll(".slide"));
      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.addEventListener("click", () => {
          lang = button.dataset.lang;
          localStorage.setItem("wascosaDeck.lang", lang);
          renderDeck();
          showSlide(index);
        });
      });
      showSlide(index);
    }

    function showSlide(nextIndex) {
      index = Math.max(0, Math.min(slides.length - 1, nextIndex));
      slides.forEach((slide, slideIndex) => slide.classList.toggle("active", slideIndex === index));
      counter.textContent = `${index + 1} / ${slides.length}`;
      progress.style.width = `${((index + 1) / slides.length) * 100}%`;
      history.replaceState(null, "", `#${index + 1}`);
    }

    prevBtn.addEventListener("click", () => showSlide(index - 1));
    nextBtn.addEventListener("click", () => showSlide(index + 1));
    document.addEventListener("keydown", (event) => {
      if (event.target && ["INPUT", "TEXTAREA", "SELECT", "BUTTON"].includes(event.target.tagName)) return;
      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") showSlide(index + 1);
      if (event.key === "ArrowLeft" || event.key === "PageUp") showSlide(index - 1);
      if (event.key === "Home") showSlide(0);
      if (event.key === "End") showSlide(slides.length - 1);
    });

    const hashIndex = Number.parseInt(window.location.hash.replace("#", ""), 10);
    index = Number.isFinite(hashIndex) ? hashIndex - 1 : 0;
    renderDeck();
  </script>
</body>
</html>
